kind = "web"
previewPath = "/"
title = "Muzuka Gilbert Photography"
version = "1.0.0"
id = "artifacts/mzuka-gilbert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21035

[services.development]
run = "pnpm --filter @workspace/mzuka-gilbert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mzuka-gilbert", "run", "build" ]
run = "pnpm --filter @workspace/mzuka-gilbert run start"

[services.env]
PORT = "21035"
